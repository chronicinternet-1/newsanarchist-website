<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found — NewsAnarchist</title>
<meta name="robots" content="noindex,follow">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F5F4F0;color:#111;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit}

.na-wm{font-size:26px;font-weight:700;color:#111;text-decoration:none}
.na-wm em{color:#E11D48;font-style:normal}
.na-404-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px;text-align:center}
.na-404-code{font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#E11D48;margin-bottom:12px}
.na-404-h{font-size:2rem;font-weight:700;margin-bottom:16px}
.na-404-p{color:#444;font-size:1.05rem;margin-bottom:28px;max-width:480px}
.na-404-btn{display:inline-block;background:#E11D48;color:#fff;text-decoration:none;padding:12px 28px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
</style>
</head>
<body>
<div class="na-mast"><div class="na-mast-inner"><a href="/" class="na-wm">News<em>Anarchist</em></a></div></div>
<div class="na-404-wrap">
  <div>
    <div class="na-404-code">404 — Not Found</div>
    <h1 class="na-404-h">This story doesn't exist.</h1>
    <p class="na-404-p">The page you're looking for was moved, retracted, or never published. Check the URL, or head back to the front page.</p>
    <a href="/" class="na-404-btn">Back to NewsAnarchist</a>
  </div>
</div>

</html>
